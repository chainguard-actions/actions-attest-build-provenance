name: Test predicate-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create artifact and predicate files
        run: |
          echo "hello world" > /tmp/artifact.txt
          echo '{"builder":{"id":"https://example.com/builder"}}' > /tmp/predicate.json
      - id: action
        uses: .
        continue-on-error: true
        with:
          subject-path: /tmp/artifact.txt
          predicate-type: https://example.com/predicate/v1
          predicate-path: /tmp/predicate.json
          github-token: ${{ github.token }}
      - name: Assert action ran (attestation may fail without real GitHub API)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action executed (outcome=$OUTCOME)"
