name: Test subject-checksums input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create checksums file
        run: |
          echo "a948904f2f0f479b8f936065b3bef2b5e5c5e5e5e5e5e5e5e5e5e5e5e5e5e5e  artifact.txt" > /tmp/checksums.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          subject-checksums: /tmp/checksums.txt
          github-token: ${{ github.token }}
      - name: Assert action ran (attestation may fail without real GitHub API)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action executed (outcome=$OUTCOME)"
