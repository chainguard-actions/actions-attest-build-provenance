name: Test subject-digest and subject-name inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          subject-digest: sha256:a948904f2f0f479b8f936065b3bef2b5e5c5e5e5e5e5e5e5e5e5e5e5e5e5e5e
          subject-name: my-artifact
          github-token: ${{ github.token }}
      - name: Assert action ran (attestation may fail without real GitHub API)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action executed (outcome=$OUTCOME)"
