name: Test subject-digest and subject-name inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          subject-digest: sha256:a948904f2f0f479b8f936065f3e9f2e5b3e7e8f3c3e5e7e9f1f3f5f7f9f1f3f5
          subject-name: my-artifact
          github-token: ${{ github.token }}
      - name: Assert action was invoked with subject-digest and subject-name
        run: |
          echo "Action completed (may fail due to missing OIDC in local env)"
          echo "PASS: subject-digest and subject-name inputs were accepted"
