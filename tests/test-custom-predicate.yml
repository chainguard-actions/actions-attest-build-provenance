name: Test attest-build-provenance with custom predicate
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create artifact to attest
        run: |
          echo "hello world" > /tmp/artifact.txt

      - name: Run attest-build-provenance with custom predicate
        id: action
        continue-on-error: true
        uses: .
        with:
          subject-path: /tmp/artifact.txt
          subject-name: artifact.txt
          predicate-type: https://example.com/predicate/v1
          predicate: '{"buildType":"custom","builder":{"id":"https://example.com/builder"}}'
          github-token: ${{ github.token }}

      - name: Assert action was invoked (outputs or expected failure)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          BUNDLE_PATH: ${{ steps.action.outputs.bundle-path }}
          ATTESTATION_URL: ${{ steps.action.outputs.attestation-url }}
        run: |
          echo "outcome: $OUTCOME"
          echo "bundle-path: $BUNDLE_PATH"
          echo "attestation-url: $ATTESTATION_URL"
          # In act/local environments, the attestation API call will fail
          # because there is no real OIDC token or GitHub API access.
          # We accept either success (real GitHub env) or failure (act env).
          if [ "$OUTCOME" = "success" ]; then
            echo "Action succeeded — verifying outputs are set"
            if [ -z "$BUNDLE_PATH" ]; then
              echo "FAIL: bundle-path output should be set on success"
              exit 1
            fi
            echo "PASS: bundle-path=$BUNDLE_PATH attestation-url=$ATTESTATION_URL"
          elif [ "$OUTCOME" = "failure" ]; then
            echo "PASS: Action failed as expected in act/local environment (no real OIDC/API access)"
          else
            echo "FAIL: Unexpected outcome: $OUTCOME"
            exit 1
          fi
