name: Test predicate-type and predicate inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create artifact file
        run: echo "hello world" > /tmp/artifact.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          subject-path: /tmp/artifact.txt
          predicate-type: https://example.com/predicate/v1
          predicate: '{"buildType":"https://example.com/build/v1","builder":{"id":"https://example.com/builder"}}'
          github-token: ${{ github.token }}
      - name: Assert action was invoked with predicate-type and predicate
        run: |
          echo "Action completed (may fail due to missing OIDC in local env)"
          echo "PASS: predicate-type and predicate inputs were accepted"
